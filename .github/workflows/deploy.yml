name: Deploy Next.js site to Pages

on:
  # Запуск при пуше в ветку main
  push:
    branches: ["main"]
  # Позволяет запускать вручную из вкладки Actions
  workflow_dispatch:

# Разрешения, необходимые для публикаций на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отключаем одновременный деплой, чтобы избежать конфликтов
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build with Next.js
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
